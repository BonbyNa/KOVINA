<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Slide Navigation</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f9f9f9;
    }
    .container {
      display: grid;
      grid-template-columns: repeat(3, 120px);
      grid-template-rows: repeat(4, 60px);
      gap: 15px;
    }
    .container a {
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #007BFF;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      font-size: 16px;
      transition: background-color 0.2s;
    }
    .container a:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="slide_01.html">Slide 01</a>
    <a href="slide_02.html">Slide 02</a>
    <a href="slide_03.html">Slide 03</a>
    <a href="slide_04.html">Slide 04</a>
    <a href="slide_05.html">Slide 05</a>
    <a href="slide_06.html">Slide 06</a>
    <a href="slide_07.html">Slide 07</a>
    <a href="slide_08.html">Slide 08</a>
    <a href="slide_09.html">Slide 09</a>
    <a href="slide_10.html">Slide 10</a>
    <a href="slide_11.html">Slide 11</a>
    <a href="slide_12.html">Slide 12</a>
  </div>
</body>
</html>
