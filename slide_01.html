<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>KOVINA PPT Cover</title>

<style>
body {
    margin: 0;
    background: #f8fafc;
    font-family: 'Pretendard', sans-serif;
}

/* 슬라이드 전체 */
.slide {
    width: 1280px;
    height: 720px;
    margin: 0 auto;
    background: linear-gradient(135deg, #ffffff 0%, #f1f5f9 100%);
    
    display: grid;
    grid-template-rows: 100px 1fr 80px;
    padding: 40px 80px;
    box-sizing: border-box;
}

/* 상단 브랜드 */
.header {
    display: flex;
    align-items: center;
}

.title {
    font-size: 28px;
    font-weight: 700;
    color: #111;
    letter-spacing: 1px;
}

/* 중앙 메시지 */
.main {
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

.tagline {
    font-size: 76px;
    line-height: 1.3;
    font-weight: 800;
    color: #f97316;
    letter-spacing: -1px;
}

/* 하단 보조 정보 */
.footer {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
}

.sub {
    font-size: 18px;
    color: #64748b;
}

/* 강조 포인트 */
.highlight {
    color: #ea580c;
}

</style>
</head>

<body>

<div class="slide">

    <!-- 상단 -->
    <div class="header">
        <div class="title">KOVINA</div>
    </div>

    <!-- 중앙 -->
    <div class="main">
        <div class="tagline">
            비자 가능성,<br>
            <span class="highlight">지금 바로 확인하세요</span>
        </div>
    </div>

    <!-- 하단 -->
    <div class="footer">
        <div class="sub">Korea Visa Navigator</div>
        <div class="sub">발표자: 홍길동</div>
    </div>

</div>

</body>
</html>
