<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>KOVINA Slide</title>

<style>
body {
    margin: 0;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* 비율 유지 컨테이너 */
.wrapper {
    width: 100%;
    max-width: 1280px;
    aspect-ratio: 16 / 9;
}

/* 실제 슬라이드 */
.slide {
    width: 100%;
    height: 100%;
    
    background: linear-gradient(135deg, #ffffff 0%, #f1f5f9 100%);
    
    display: grid;
    grid-template-rows: 100px 1fr 80px;
    padding: 40px 80px;
    box-sizing: border-box;
}

/* 상단 */
.header {
    display: flex;
    align-items: center;
}

.title {
    font-size: 28px;
    font-weight: 700;
    color: #111;
}

/* 중앙 */
.main {
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

.tagline {
    font-size: 5vw; /* 핵심: 반응형 */
    line-height: 1.3;
    font-weight: 800;
    color: #f97316;
}

/* 하단 */
.footer {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
}

.sub {
    font-size: 1.2vw;
    color: #64748b;
}

</style>
</head>

<body>

<div class="wrapper">
    <div class="slide">

        <div class="header">
            <div class="title">KOVINA</div>
        </div>

        <div class="main">
            <div class="tagline">
                비자 가능성,<br>
                지금 바로 확인하세요
            </div>
        </div>

        <div class="footer">
            <div class="sub">Korea Visa Navigator</div>
            <div class="sub">발표자</div>
        </div>

    </div>
</div>

</body>
</html>
