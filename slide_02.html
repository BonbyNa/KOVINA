<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>KOVINA Slide 02</title>

<style>
body {
    margin: 0;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Pretendard', sans-serif;
}

/* 공통 wrapper */
.wrapper {
    width: 100%;
    max-width: 1280px;
    aspect-ratio: 16 / 9;
}

/* 공통 slide */
.slide {
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #ffffff 0%, #f1f5f9 100%);
    
    display: grid;
    grid-template-rows: 100px 1fr 80px;
    padding: 40px 80px;
    box-sizing: border-box;
}

/* 상단 */
.header {
    display: flex;
    align-items: center;
}

.title {
    font-size: 28px;
    font-weight: 700;
    color: #111;
}

/* 중앙 영역 (변화 핵심) */
.main {
    display: flex;
    flex-direction: column;
    justify-content: center;
}

/* 슬라이드 제목 */
.main-title {
    font-size: 48px;
    font-weight: 800;
    margin-bottom: 40px;
    color: #111;
}

/* 내용 */
.content {
    font-size: 28px;
    line-height: 1.6;
    color: #334155;
}

/* 강조 */
.highlight {
    color: #f97316;
    font-weight: 700;
}

/* 하단 */
.footer {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
}

.sub {
    font-size: 1.2vw;
    color: #64748b;
}

</style>
</head>

<body>

<div class="wrapper">
    <div class="slide">

        <!-- 상단 -->
        <div class="header">
            <div class="title">KOVINA</div>
        </div>

        <!-- 중앙 -->
        <div class="main">

            <div class="main-title">
                문제는 명확합니다
            </div>

            <div class="content">
                비자 정보는 <span class="highlight">복잡하고 분산되어 있으며</span><br>
                일반 사용자가 이해하기 어렵습니다.<br><br>

                결국 많은 외국인과 유치기업은<br>
                <span class="highlight">불필요한 비용과 시간</span>을 지불하고 있습니다.
            </div>

        </div>

        <!-- 하단 -->
        <div class="footer">
            <div class="sub">Korea Visa Navigator</div>
            <div class="sub">02</div>
        </div>

    </div>
</div>

</body>
</html>
