<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>KOVINA Slide 03</title>

<style>
body {
    margin: 0;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Pretendard', sans-serif;
}

/* 비율 유지 */
.wrapper {
    width: 100%;
    max-width: 1280px;
    aspect-ratio: 16 / 9;
}

/* 슬라이드 */
.slide {
    width: 100%;
    height: 100%;
    background: #ffffff;
    
    display: grid;
    grid-template-rows: 100px 1fr 80px;
    padding: 40px 80px;
    box-sizing: border-box;

    position: relative;
}

/* 배경 장식 */
.slide::after {
    content: "";
    position: absolute;
    right: -100px;
    top: -100px;
    width: 320px;
    height: 320px;
    background: #f97316;
    opacity: 0.05;
    border-radius: 50%;
}

/* 상단 */
.header {
    display: flex;
    align-items: center;
}

.title {
    font-size: 28px;
    font-weight: 700;
    color: #111;
}

/* 중앙 */
.main {
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding-left: 40px;
}

/* 좌측 라인 */
.main::before {
    content: "";
    position: absolute;
    left: 0;
    top: 10%;
    width: 6px;
    height: 80%;
    background: #f97316;
    border-radius: 3px;
}

/* 제목 */
.main-title {
    font-size: 48px;
    font-weight: 800;
    margin-bottom: 40px;
    color: #111;
}

/* 박스 */
.content-box {
    background: #f8fafc;
    padding: 30px 40px;
    border-radius: 16px;
}

/* 내용 */
.content {
    font-size: 28px;
    line-height: 1.6;
    color: #334155;
}

/* 강조 */
.highlight {
    color: #f97316;
    font-weight: 700;
}

/* 하단 */
.footer {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
}

.sub {
    font-size: 1.2vw;
    color: #64748b;
}

</style>
</head>

<body>

<div class="wrapper">
    <div class="slide">

        <!-- 상단 -->
        <div class="header">
            <div class="title">KOVINA</div>
        </div>

        <!-- 중앙 -->
        <div class="main">

            <div class="main-title">
                기존 방식으로는 해결되지 않습니다
            </div>

            <div class="content-box">
                <div class="content">
                    정부 사이트를 통해 정보를 찾거나<br>
                    전문가 상담을 이용할 수는 있지만,<br><br>

                    정보는 여전히 <span class="highlight">복잡하고 이해하기 어렵고</span><br>
                    상담은 <span class="highlight">비용과 시간이 소요됩니다</span><br><br>

                    결국 사용자는<br>
                    <span class="highlight">스스로 판단하기 어렵습니다</span>
                </div>
            </div>

        </div>

        <!-- 하단 -->
        <div class="footer">
            <div class="sub">Korea Visa Navigator</div>
            <div class="sub">03</div>
        </div>

    </div>
</div>

</body>
</html>
