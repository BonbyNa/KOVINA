<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>KOVINA Slide 05</title>

<style>
body {
    margin: 0;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Pretendard', sans-serif;
}

/* PPT 비율 */
.wrapper {
    width: 100%;
    max-width: 1280px;
    aspect-ratio: 16 / 9;
}

/* 슬라이드 */
.slide {
    width: 100%;
    height: 100%;
    background: #ffffff;
    display: grid;
    grid-template-rows: 100px 1fr 80px;
    padding: 40px 80px;
    box-sizing: border-box;
    position: relative;
}

/* 배경 포인트 */
.slide::before {
    content: "";
    position: absolute;
    left: -120px;
    bottom: -120px;
    width: 300px;
    height: 300px;
    background: #0ea5e9;
    opacity: 0.07;
    border-radius: 50%;
}

.slide::after {
    content: "";
    position: absolute;
    right: -100px;
    top: -100px;
    width: 280px;
    height: 280px;
    background: #6366f1;
    opacity: 0.06;
    border-radius: 50%;
}

/* 상단 */
.header {
    display: flex;
    align-items: center;
}

.title {
    font-size: 28px;
    font-weight: 700;
}

/* 중앙 */
.main {
    display: flex;
    flex-direction: column;
    justify-content: center;
}

/* 메인 제목 */
.main-title {
    font-size: 46px;
    font-weight: 800;
    margin-bottom: 50px;
}

/* 병렬 구조 */
.parallel {
    display: flex;
    gap: 50px;
}

/* 카드 */
.card {
    flex: 1;
    background: #f8fafc;
    border-radius: 20px;
    padding: 40px;
    position: relative;
}

/* 카드 제목 */
.card-title {
    font-size: 26px;
    font-weight: 800;
    margin-bottom: 30px;
}

/* 타임라인 */
.timeline {
    position: relative;
    padding-left: 30px;
}

/* 세로 라인 */
.timeline::before {
    content: "";
    position: absolute;
    left: 8px;
    top: 0;
    width: 2px;
    height: 100%;
    background: #cbd5f5;
}

/* 각 단계 */
.step {
    position: relative;
    margin-bottom: 28px;
    font-size: 20px;
    color: #334155;
}

/* 원형 포인트 */
.step::before {
    content: "";
    position: absolute;
    left: -22px;
    top: 6px;
    width: 14px;
    height: 14px;
    border-radius: 50%;
}

/* 색상 분리 (좌/우) */
.card.left .card-title { color: #2563eb; }
.card.left .step::before { background: #2563eb; }

.card.right .card-title { color: #7c3aed; }
.card.right .step::before { background: #7c3aed; }

/* 강조 */
.highlight {
    font-weight: 700;
    color: #0f172a;
}

/* 하단 */
.footer {
    display: flex;
    justify-content: space-between;
}

.sub {
    font-size: 1.2vw;
    color: #64748b;
}

</style>
</head>

<body>

<div class="wrapper">
<div class="slide">

    <!-- 상단 -->
    <div class="header">
        <div class="title">KOVINA</div>
    </div>

    <!-- 중앙 -->
    <div class="main">

        <div class="main-title">
            서비스 구조 및 작동 방식
        </div>

        <div class="parallel">

            <!-- 자동 진단 -->
            <div class="card left">
                <div class="card-title">
                    특정 비자 자동 진단
                </div>

                <div class="timeline">
                    <div class="step">비자 유형 선택</div>
                    <div class="step">간단 문항 순차 응답</div>
                    <div class="step"><span class="highlight">가능성 결과 즉시 확인</span></div>
                    <div class="step">관련 추가 정보 제공</div>
                </div>
            </div>

            <!-- 경로 분석 -->
            <div class="card right">
                <div class="card-title">
                    체류자격 경로 분석
                </div>

                <div class="timeline">
                    <div class="step">현재 체류자격 선택</div>
                    <div class="step">이동 가능한 상위 비자 제시</div>
                    <div class="step"><span class="highlight">추가 요구 조건 안내</span></div>
                </div>
            </div>

        </div>

    </div>

    <!-- 하단 -->
    <div class="footer">
        <div class="sub">Korea Visa Navigator</div>
        <div class="sub">05</div>
    </div>

</div>
</div>

</body>
</html>
