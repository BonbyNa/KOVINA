<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>KOVINA Slide 05</title>

<style>
body {
    margin: 0;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Pretendard', sans-serif;
}

/* 비율 */
.wrapper {
    width: 100%;
    max-width: 1280px;
    aspect-ratio: 16 / 9;
}

/* 슬라이드 */
.slide {
    width: 100%;
    height: 100%;
    background: #ffffff;
    
    display: grid;
    grid-template-rows: 100px 1fr 80px;
    padding: 40px 80px;
    box-sizing: border-box;

    position: relative;
}

/* 블루 장식 */
.slide::after {
    content: "";
    position: absolute;
    right: -100px;
    top: -100px;
    width: 320px;
    height: 320px;
    background: #2563eb;
    opacity: 0.07;
    border-radius: 50%;
}

/* 상단 */
.header {
    display: flex;
    align-items: center;
}

.title {
    font-size: 28px;
    font-weight: 700;
}

/* 중앙 */
.main {
    display: flex;
    flex-direction: column;
    justify-content: center;
}

/* 제목 */
.main-title {
    font-size: 48px;
    font-weight: 800;
    margin-bottom: 50px;
}

/* 병렬 컨테이너 */
.parallel {
    display: flex;
    gap: 40px;
}

/* 카드 */
.card {
    flex: 1;
    background: #f1f5ff;
    border-radius: 20px;
    padding: 40px;
}

/* 카드 제목 */
.card-title {
    font-size: 26px;
    font-weight: 800;
    color: #2563eb;
    margin-bottom: 20px;
}

/* 카드 내용 */
.card-content {
    font-size: 22px;
    line-height: 1.6;
    color: #334155;
}

/* 강조 */
.highlight {
    color: #1e40af;
    font-weight: 700;
}

/* 하단 */
.footer {
    display: flex;
    justify-content: space-between;
}

.sub {
    font-size: 1.2vw;
    color: #64748b;
}

</style>
</head>

<body>

<div class="wrapper">
    <div class="slide">

        <!-- 상단 -->
        <div class="header">
            <div class="title">KOVINA</div>
        </div>

        <!-- 중앙 -->
        <div class="main">

            <div class="main-title">
                두 가지 핵심 기능으로 구성됩니다
            </div>

            <div class="parallel">

                <!-- 기능 1 -->
                <div class="card">
                    <div class="card-title">
                        특정 비자 자동 진단
                    </div>
                    <div class="card-content">
                        특정 비자의 발급 가능 여부를<br>
                        <span class="highlight">즉시 확인</span>
                    </div>
                </div>

                <!-- 기능 2 -->
                <div class="card">
                    <div class="card-title">
                        체류자격 경로 분석
                    </div>
                    <div class="card-content">
                        이동 가능한 상위 비자 유형과<br>
                        <span class="highlight">추가 요구 조건 안내</span>
                    </div>
                </div>

            </div>

        </div>

        <!-- 하단 -->
        <div class="footer">
            <div class="sub">Korea Visa Navigator</div>
            <div class="sub">05</div>
        </div>

    </div>
</div>

</body>
</html>
