<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>KOVINA Slide 07</title>

<style>
body {
    margin: 0;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Pretendard', sans-serif;
}

/* PPT 비율 */
.wrapper {
    width: 100%;
    max-width: 1280px;
    aspect-ratio: 16 / 9;
}

/* 슬라이드 */
.slide {
    width: 100%;
    height: 100%;
    background: #ffffff;
    display: grid;
    grid-template-rows: 100px 1fr 80px;
    padding: 40px 80px;
    box-sizing: border-box;
    position: relative;
}

/* 배경 포인트 */
.slide::before {
    content: "";
    position: absolute;
    left: -120px;
    bottom: -120px;
    width: 280px;
    height: 280px;
    background: #f97316;
    opacity: 0.06;
    border-radius: 50%;
}

.slide::after {
    content: "";
    position: absolute;
    right: -120px;
    top: -120px;
    width: 280px;
    height: 280px;
    background: #22c55e;
    opacity: 0.06;
    border-radius: 50%;
}

/* 상단 */
.header {
    display: flex;
    align-items: center;
}

.title {
    font-size: 28px;
    font-weight: 700;
}

/* 중앙 */
.main {
    display: flex;
    flex-direction: column;
    justify-content: center;
}

/* 메인 제목 */
.main-title {
    font-size: 46px;
    font-weight: 800;
    margin-bottom: 60px;
}

/* 3단 구조 */
.flow {
    display: flex;
    align-items: center;
    gap: 30px;
}

/* 카드 */
.card {
    flex: 1;
    background: #f8fafc;
    border-radius: 20px;
    padding: 35px;
    min-height: 220px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

/* 카드 제목 */
.card-title {
    font-size: 24px;
    font-weight: 800;
    margin-bottom: 18px;
}

/* 카드 내용 */
.card-desc {
    font-size: 20px;
    color: #475569;
    line-height: 1.6;
}

/* 화살표 */
.arrow {
    font-size: 36px;
    font-weight: 800;
    color: #cbd5e1;
}

/* 색상 구분 */
.problem .card-title { color: #ef4444; }
.limit .card-title { color: #f97316; }
.solution .card-title { color: #22c55e; }

/* 강조 */
.highlight {
    font-weight: 700;
    color: #0f172a;
}

/* 하단 */
.footer {
    display: flex;
    justify-content: space-between;
}

.sub {
    font-size: 1.2vw;
    color: #64748b;
}

</style>
</head>

<body>

<div class="wrapper">
<div class="slide">

    <!-- 상단 -->
    <div class="header">
        <div class="title">KOVINA</div>
    </div>

    <!-- 중앙 -->
    <div class="main">

        <div class="main-title">
            왜 반드시 필요한 서비스인가
        </div>

        <div class="flow">

            <!-- 문제 -->
            <div class="card problem">
                <div class="card-title">현재 문제</div>
                <div class="card-desc">
                    외국인은 비자 가능 여부를 확인하기 위해<br>
                    <span class="highlight">복잡한 규정과 분산된 정보를 직접 해석</span>해야 합니다
                </div>
            </div>

            <div class="arrow">→</div>

            <!-- 한계 -->
            <div class="card limit">
                <div class="card-title">기존 시스템의 한계</div>
                <div class="card-desc">
                    정부 및 정보 제공 서비스는<br>
                    <span class="highlight">단순 정보 제공에 그치며</span><br>
                    개인별 판단을 제공하지 못합니다
                </div>
            </div>

            <div class="arrow">→</div>

            <!-- 해결 -->
            <div class="card solution">
                <div class="card-title">필연적 필요성</div>
                <div class="card-desc">
                    사용자가 스스로 가능성을 확인할 수 있는<br>
                    <span class="highlight">즉시 판단형 시스템</span>이 필요합니다
                </div>
            </div>

        </div>

    </div>

    <!-- 하단 -->
    <div class="footer">
        <div class="sub">Korea Visa Navigator</div>
        <div class="sub">06</div>
    </div>

</div>
</div>

</body>
</html>s
