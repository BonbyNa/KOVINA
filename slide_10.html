<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>KOVINA Slide 10 Final</title>

<style>
body {
    margin: 0;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Pretendard', sans-serif;
}

.wrapper {
    width: 100%;
    max-width: 1280px;
    aspect-ratio: 16 / 9;
}

/* 슬라이드 */
.slide {
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: #ffffff;
    display: grid;
    grid-template-rows: 100px 1fr 80px;
    padding: 40px 80px;
    box-sizing: border-box;
}

/* 상단 */
.header {
    display: flex;
    align-items: center;
}

.title {
    font-size: 28px;
    font-weight: 700;
    opacity: 0.9;
}

/* 중앙 */
.main {
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.main-title {
    font-size: 48px;
    font-weight: 800;
    margin-bottom: 60px;
}

/* 카드 */
.cards {
    display: flex;
    gap: 30px;
}

.card {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border-radius: 20px;
    padding: 35px;
    backdrop-filter: blur(6px);
}

/* 카드 제목 */
.card-title {
    font-size: 24px;
    font-weight: 800;
    margin-bottom: 15px;
}

/* 색상 */
.card1 .card-title { color: #3b82f6; }
.card2 .card-title { color: #f97316; }
.card3 .card-title { color: #22c55e; }

/* 내용 */
.card-desc {
    font-size: 20px;
    line-height: 1.6;
    opacity: 0.9;
}

/* 강조 */
.highlight {
    font-weight: 700;
    color: #ffffff;
}

/* 하단 */
.footer {
    display: flex;
    justify-content: space-between;
}

.sub {
    font-size: 1.2vw;
    opacity: 0.7;
}

</style>
</head>

<body>

<div class="wrapper">
<div class="slide">

    <div class="header">
        <div class="title">KOVINA</div>
    </div>

    <div class="main">

        <div class="main-title">
            왜 KOVINA인가
        </div>

        <div class="cards">

            <div class="card card1">
                <div class="card-title">WHY ME</div>
                <div class="card-desc">
                    <span class="highlight">출입국 행정 실무 경험</span><br>
                    현장의 문제를 이해<br>
                    실행 가능한 역량
                </div>
            </div>

            <div class="card card2">
                <div class="card-title">WHY NOW</div>
                <div class="card-desc">
                    외국인 증가<br>
                    <span class="highlight">지금이 기회</span>
                </div>
            </div>

            <div class="card card3">
                <div class="card-title">WHY CENTER</div>
                <div class="card-desc">
                    창업센터 인프라 활용<br>
                    <span class="highlight">빠른 실행</span>
                </div>
            </div>

        </div>

    </div>

    <div class="footer">
        <div class="sub">Korea Visa Navigator</div>
        <div class="sub">10</div>
    </div>

</div>
</div>

</body>
</html>
